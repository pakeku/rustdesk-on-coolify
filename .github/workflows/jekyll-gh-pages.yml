# Deploy static site (index.html) to GitHub Pages
name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true only works with a PAT/App token, not GITHUB_TOKEN.
      # Pages must be: Settings → Pages → Source = GitHub Actions
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Plain static site — no Jekyll required (avoids jekyll-build-pages)
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
